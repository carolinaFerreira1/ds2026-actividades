<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="estudios.html">Estudios</a>
        <a href="experiencia.html">Experiencia</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <main>
        <section class="formulario-container">
            <h2>Contacto</h2>
            <form action="#" method="POST">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

                <label for="mensaje">Mensaje (mínimo 10 caracteres):</label>
                <textarea id="mensaje" name="mensaje" rows="4" minlength="10" required></textarea>

                <button type="submit">Enviar mensaje</button>
            </form>
        </section>
    </main>
</body>
</html>
